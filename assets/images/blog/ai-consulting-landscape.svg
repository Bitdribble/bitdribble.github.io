<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="landscapeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="modelGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:0.8" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#landscapeGradient)"/>

  <!-- Central Business Model Landscape -->
  <g transform="translate(400, 200)">
    <!-- Product Platform (Left) -->
    <g transform="translate(-150, 0)">
      <rect x="-40" y="-15" width="80" height="30" rx="5" fill="url(#modelGradient)" stroke="#3b82f6" stroke-width="2"/>
      <text x="0" y="5" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#1e40af" text-anchor="middle">Platform</text>
      <circle cx="-20" cy="-25" r="6" fill="#10b981"/>
      <circle cx="0" cy="-30" r="6" fill="#10b981"/>
      <circle cx="20" cy="-25" r="6" fill="#10b981"/>
      <text x="0" y="-35" font-family="Arial, sans-serif" font-size="8" fill="#ffffff" text-anchor="middle">Product</text>
    </g>

    <!-- Services (Center) -->
    <g transform="translate(0, 0)">
      <rect x="-40" y="-15" width="80" height="30" rx="5" fill="url(#modelGradient)" stroke="#f59e0b" stroke-width="2"/>
      <text x="0" y="5" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#92400e" text-anchor="middle">Services</text>
      <!-- Service icons -->
      <path d="M-15,-25 L-10,-30 L-5,-25 M0,-25 L5,-30 L10,-25 M15,-25 L20,-30 L25,-25" stroke="#f59e0b" stroke-width="2" fill="none"/>
      <text x="0" y="-35" font-family="Arial, sans-serif" font-size="8" fill="#ffffff" text-anchor="middle">Bespoke</text>
    </g>

    <!-- Embedded (Right) -->
    <g transform="translate(150, 0)">
      <rect x="-40" y="-15" width="80" height="30" rx="5" fill="url(#modelGradient)" stroke="#8b5cf6" stroke-width="2"/>
      <text x="0" y="5" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#6d28d9" text-anchor="middle">Embedded</text>
      <!-- Embedded connections -->
      <circle cx="-15" cy="-25" r="4" fill="#8b5cf6"/>
      <circle cx="0" cy="-28" r="4" fill="#8b5cf6"/>
      <circle cx="15" cy="-25" r="4" fill="#8b5cf6"/>
      <line x1="-15" y1="-25" x2="0" y2="-28" stroke="#8b5cf6" stroke-width="2"/>
      <line x1="0" y1="-28" x2="15" y2="-25" stroke="#8b5cf6" stroke-width="2"/>
      <text x="0" y="-35" font-family="Arial, sans-serif" font-size="8" fill="#ffffff" text-anchor="middle">Hybrid</text>
    </g>

    <!-- Connecting arrows -->
    <path d="M-70,-10 L70,-10" stroke="#ffffff" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
    <path d="M80,-10 L230,-10" stroke="#ffffff" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  </g>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffffff"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="360" font-family="Arial, sans-serif" font-size="38" font-weight="bold"
        fill="white" text-anchor="middle">AI Consulting</text>

  <!-- Subtitle -->
  <text x="400" y="390" font-family="Arial, sans-serif" font-size="20"
        fill="rgba(255,255,255,0.9)" text-anchor="middle">Market Analysis</text>

  <!-- Tagline -->
  <text x="400" y="415" font-family="Arial, sans-serif" font-size="16"
        fill="rgba(255,255,255,0.8)" text-anchor="middle">Companies & Business Models</text>
</svg>